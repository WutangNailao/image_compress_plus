name: image_compress_plus_ios
description: iOS implementation of image_compress_plus.
repository: https://github.com/WuTangNaiLao/image_compress_plus
version: 3.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  image_compress_plus_platform_interface: ^3.0.0

dev_dependencies:
  pigeon: ^26.3.3

flutter:
  plugin:
    implements: image_compress_plus
    platforms:
      ios:
        pluginClass: ImageCompressPlugin
        dartPluginClass: ImageCompressPlusIOS
