name: image_compress_plus_workspace
publish_to: none

environment:
  sdk: '>=3.9.0 <4.0.0'

workspace:
  - packages/image_compress_plus
  - packages/image_compress_plus/example
  - packages/image_compress_plus_android
  - packages/image_compress_plus_ios
  - packages/image_compress_plus_linux
  - packages/image_compress_plus_macos
  - packages/image_compress_plus_ohos
  - packages/image_compress_plus_platform_interface
  - packages/image_compress_plus_web
  - packages/image_compress_plus_windows

dev_dependencies:
  melos: ^8.0.0

melos:
  repository: https://github.com/WuTangNaiLao/image_compress_plus

  scripts:
    analyze:
      exec: dart analyze .
    get:
      exec: flutter pub get
    test:
      exec: flutter test
    format:
      exec: dart format --set-exit-if-changed .
    try_build_apk:
      exec: |
        set -e
        flutter pub get
        flutter build apk --debug
      packageFilters:
        fileExists: lib/main.dart
    try_build_ios:
      exec: |
        set -e
        flutter pub get
        flutter build ios --debug --no-codesign
      packageFilters:
        fileExists: lib/main.dart
    try_build_web:
      exec: |
        set -e
        flutter pub get
        flutter build web
      packageFilters:
        fileExists: lib/main.dart
    try_build_macos:
      exec: |
        set -e
        flutter pub get
        flutter build macos
      packageFilters:
        fileExists: lib/main.dart
    cp_files:
      exec: |
        set -e
        if [ -f "../../LICENSE" ]; then
          cp ../../LICENSE LICENSE
        fi
        if [ -f "../../README.md" ]; then
          cp ../../README.md README.md
        fi

  sdkPath: auto

  command:
    version:
      releaseUrl: true
